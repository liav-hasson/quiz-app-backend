name: "Build & Push: Multiplayer"

on:
  push:
    branches: [main]
    paths:
      - "multiplayer/**"
      - "common/**"
      - ".github/workflows/build-push-multiplayer.yaml"
  workflow_dispatch:

env:
  DOCKER_IMAGE: liavvv/quiz-multiplayer

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          chmod +x multiplayer/scripts/compute_next_version.sh
          FULL_TAG=$(./multiplayer/scripts/compute_next_version.sh . auto mp-)
          VERSION=${FULL_TAG#mp-}  # strip prefix for Docker tag
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "git_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"
          echo "Computed version: $FULL_TAG (Docker tag: $VERSION)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: multiplayer/ci/app-dockerfile/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag release in git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.version.outputs.git_tag }}" -m "Release ${{ steps.version.outputs.tag }} (multiplayer)"
          git push origin "${{ steps.version.outputs.git_tag }}"

      - name: Summary
        run: |
          echo "### Docker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Update Helm chart tag to:** \`${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update homelab chart version
        if: ${{ secrets.HOMELAB_PAT != '' }}
        env:
          HOMELAB_PAT: ${{ secrets.HOMELAB_PAT }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git clone https://x-access-token:${HOMELAB_PAT}@github.com/liav-hasson/homelab.git /tmp/homelab
          cd /tmp/homelab
          VALUES=quizlabs/charts/workloads/quiz-multiplayer/values.yaml
          sed -i "s|^\(  tag: \).*|\1\"${VERSION}\"|" "$VALUES"
          sed -i "/APP_VERSION/{n;s|value: .*|value: \"${VERSION}\"|;}" "$VALUES"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$VALUES"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "bump: quiz-multiplayer ${VERSION}"
          git push origin main
